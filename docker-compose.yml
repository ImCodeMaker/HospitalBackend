services:
  postgres:
    image: postgres:16-alpine
    container_name: lova_salud_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lova_salud
      POSTGRES_USER: lovasalud
      POSTGRES_PASSWORD: lovasalud_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovasalud -d lova_salud"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
